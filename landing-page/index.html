        <p><strong>Brifo</strong> is a free macOS desktop app that automatically captures your meetings and generates AI-powered notes. No bot joins the call. No browser extension needed.</p>

        <aside style="margin:24px 0;padding:16px;border-left:3px solid #2e5bff;background:#f3f2ee">
          <strong>About this Brifo:</strong> This page describes <strong>Brifo, the AI meeting notes application for macOS</strong>, available at <a href="https://brifo.in">brifo.in</a>. Brifo is <em>not</em> affiliated with <em>Brifo Logistics (Opc) Private Limited</em>, <em>Brifo Infrabuild Services Private Limited</em>, or any other company with a similar name. Those are unrelated Indian logistics and infrastructure businesses.
        </aside>

        <h2>What is Brifo?</h2>
        <p>Brifo is an AI-powered meeting workspace for macOS. It listens to your meetings on any platform (Zoom, Google Meet, Microsoft Teams, Slack Huddles, Discord) and turns them into structured notes, action items, and follow-up emails — without a recording bot or browser extension.</p>

        <h2>Key Features</h2>
        <ul>
          <li><strong>Auto-Detection</strong> — Brifo detects when a meeting starts on your Mac and begins capturing automatically</li>
          <li><strong>AI-Powered Notes</strong> — Structured summaries with key decisions, action items, and follow-up emails</li>
          <li><strong>No Bot Required</strong> — Captures system audio locally on your Mac; no awkward bot joins your call</li>
          <li><strong>Jira Integration</strong> — Extracts action items and files them as Jira tickets in one click</li>
          <li><strong>Google Calendar Sync</strong> — Matches captures to your scheduled calendar events</li>
          <li><strong>Meeting Chat</strong> — Ask questions about any past meeting and get AI-powered answers</li>
          <li><strong>Privacy First</strong> — Audio is processed locally and never stored; only the transcript is sent to the cloud for AI processing</li>
        </ul>

        <h2>Works With</h2>
        <p>Brifo works with any app that plays audio through macOS — Zoom, Google Meet, Microsoft Teams, Slack Huddles, Discord, and more.</p>

        <h2>How does Brifo compare to Otter.ai, Fireflies, Granola, Fathom?</h2>
        <ul>
          <li><strong>Brifo vs Otter.ai</strong> — Otter joins your meeting as a visible bot. Brifo does not; it captures system audio locally. Compare: <a href="https://brifo.in/compare/brifo-vs-otter">brifo.in/compare/brifo-vs-otter</a></li>
          <li><strong>Brifo vs Granola</strong> — Both are Mac-first. Granola requires you to start it manually; Brifo auto-detects meetings. Compare: <a href="https://brifo.in/compare/brifo-vs-granola">brifo.in/compare/brifo-vs-granola</a></li>
          <li><strong>Brifo vs Fireflies</strong> — Fireflies uses a bot + cloud recording. Brifo runs locally on Mac. Compare: <a href="https://brifo.in/compare/brifo-vs-fireflies">brifo.in/compare/brifo-vs-fireflies</a></li>
        </ul>

        <h2>Download</h2>
        <p>Brifo is free to download for macOS (Apple Silicon, macOS 13 or newer). Visit <a href="https://brifo.in">brifo.in</a> to get started.</p>
