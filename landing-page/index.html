        <h1>Brifo - AI Meeting Notes Without Bots</h1>
        <p>Brifo is a free macOS desktop app that automatically captures your meetings and generates AI-powered notes. No bot joins the call. No browser extension needed.</p>

        <h2>Key Features</h2>
        <ul>
          <li><strong>Auto-Detection</strong> - Automatically detects when a meeting starts and begins capturing</li>
          <li><strong>AI-Powered Notes</strong> - Generates meeting summaries, key decisions, action items, and follow-up emails</li>
          <li><strong>No Bot Required</strong> - Captures system audio locally, no awkward bot joins your call</li>
          <li><strong>Jira Integration</strong> - Automatically creates Jira tickets from action items</li>
          <li><strong>Google Calendar Sync</strong> - Matches meetings with your scheduled calendar events</li>
          <li><strong>Meeting Chat</strong> - Ask questions about any past meeting and get AI-powered answers</li>
          <li><strong>Privacy First</strong> - Audio processed locally, never stored. Only transcripts sent to cloud.</li>
        </ul>

        <h2>Works With</h2>
        <p>Zoom, Google Meet, Microsoft Teams, Slack Huddles, Discord, and any app that uses system audio on macOS.</p>

        <h2>Download</h2>
        <p>Brifo is free to download for macOS (Apple Silicon). Visit <a href="https://brifo.in">brifo.in</a> to get started.</p>

        <h2>About Brifo</h2>
        <p>Brifo is an AI-powered meeting workspace built for professionals who want accurate meeting notes without the hassle of a recording bot. It runs as a native Mac app with a cloud backend for AI processing.</p>
