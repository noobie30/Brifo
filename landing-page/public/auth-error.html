<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Brifo — Sign-in error</title>
    <meta name="theme-color" content="#16150F" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        color-scheme: light;
        --canvas: #f7f6f3;
        --surface: #ffffff;
        --subtle: #f3f2ee;
        --fg: #16150f;
        --fg-muted: #6f6d63;
        --fg-subtle: #9a988e;
        --border: #e6e4de;
        --accent: #2e5bff;
        --danger: #b42318;
        --danger-soft: rgba(180, 35, 24, 0.1);
      }
      body {
        font-family:
          "Geist", ui-sans-serif, system-ui, -apple-system, "Segoe UI",
          sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--canvas);
        color: var(--fg);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        font-feature-settings: "ss01", "cv11";
        position: relative;
        overflow: hidden;
      }
      .glow {
        position: absolute;
        top: -180px;
        left: 50%;
        transform: translateX(-50%);
        width: 620px;
        height: 620px;
        border-radius: 50%;
        background: var(--danger);
        opacity: 0.05;
        filter: blur(90px);
        pointer-events: none;
      }
      .card {
        position: relative;
        width: min(460px, calc(100% - 40px));
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 44px 40px 36px;
        text-align: center;
        animation: cardIn 0.45s cubic-bezier(0.2, 0.8, 0.2, 1);
      }
      @keyframes cardIn {
        from {
          opacity: 0;
          transform: translateY(12px) scale(0.99);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
      .brand {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 28px;
      }
      .brand-name {
        font-size: 14px;
        font-weight: 600;
        letter-spacing: -0.2px;
      }
      .icon {
        width: 48px;
        height: 48px;
        margin: 0 auto 20px;
        background: var(--danger-soft);
        color: var(--danger);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .icon svg {
        width: 22px;
        height: 22px;
      }
      .serif {
        font-family: "Instrument Serif", ui-serif, Georgia, serif;
        font-size: 30px;
        letter-spacing: -0.6px;
        line-height: 1.1;
        margin-bottom: 8px;
        font-weight: 500;
      }
      .message {
        font-size: 14px;
        color: var(--fg-muted);
        line-height: 1.6;
        max-width: 340px;
        margin: 0 auto 24px;
      }
      .actions {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        height: 42px;
        padding: 0 20px;
        border-radius: 10px;
        font-family: inherit;
        font-size: 14px;
        font-weight: 500;
        line-height: 1;
        cursor: pointer;
        border: 1px solid transparent;
        transition:
          background 120ms,
          border-color 120ms,
          color 120ms;
        text-decoration: none;
      }
      .btn-primary {
        background: var(--fg);
        color: #fff;
      }
      .btn-primary:hover {
        background: #000;
      }
      .btn-ghost {
        background: transparent;
        color: var(--fg-muted);
      }
      .btn-ghost:hover {
        background: var(--subtle);
        color: var(--fg);
      }
    </style>
  </head>
  <body>
    <div class="glow" aria-hidden="true"></div>
    <main class="card">
      <div class="brand">
        <img src="/favicon.png" width="36" height="36" alt="Brifo" style="border-radius: 8px; display: block;" />
        <span class="brand-name">Brifo</span>
      </div>

      <div class="icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none">
          <path
            d="M6 6l12 12M18 6L6 18"
            stroke="currentColor"
            stroke-width="2.4"
            stroke-linecap="round"
          />
        </svg>
      </div>

      <h1 class="serif">Sign-in didn't finish</h1>
      <p class="message" id="reason">
        Something went wrong. Close this tab and try again in Brifo.
      </p>

      <div class="actions">
        <a class="btn btn-primary" href="brifo://auth-error">Return to Brifo</a>
      </div>
    </main>

    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var reason = params.get("reason");
        var el = document.getElementById("reason");
        if (!el) return;
        if (reason === "canceled") {
          el.textContent =
            "Sign-in was canceled. Close this tab and try again in Brifo.";
        } else if (reason === "blocked") {
          el.textContent =
            "Access was blocked by Google. Your account may not be an approved test user yet.";
        } else if (reason === "state") {
          el.textContent =
            "Security validation failed. Close this tab and try signing in again in Brifo.";
        }
      })();
    </script>
  </body>
</html>
