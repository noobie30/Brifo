<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Brifo - Sign-in Error</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f9fafb;
        color: #111827;
      }
      .card {
        width: min(440px, calc(100% - 40px));
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 20px;
        padding: 48px 40px;
        text-align: center;
        animation: fadeIn 0.4s ease-out;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .logo { width: 56px; height: 56px; margin: 0 auto 24px; border-radius: 14px; }
      .error-icon {
        width: 56px; height: 56px; margin: 0 auto 20px;
        background: #ef4444;
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
      }
      .error-icon svg { width: 28px; height: 28px; }
      h1 { font-size: 22px; font-weight: 600; margin-bottom: 8px; }
      .message { font-size: 15px; color: #6b7280; line-height: 1.6; }
      .close-btn {
        display: inline-block; margin-top: 24px; padding: 10px 28px;
        background: #111827; color: #fff; border: none; border-radius: 10px;
        font-size: 14px; font-weight: 500; cursor: pointer;
        text-decoration: none; transition: background 0.2s;
      }
      .close-btn:hover { background: #374151; }
    </style>
  </head>
  <body>
    <div class="card">
      <img src="/favicon.png" alt="Brifo" class="logo" />
      <div class="error-icon">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M6 6l12 12M18 6L6 18" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </div>
      <h1>Sign-in failed</h1>
      <p class="message" id="reason">Something went wrong. Please close this tab and try again in Brifo.</p>
      <a href="#" class="close-btn" onclick="window.close(); return false;">Close this tab</a>
    </div>
    <script>
      const params = new URLSearchParams(window.location.search);
      const reason = params.get('reason');
      const el = document.getElementById('reason');
      if (reason === 'canceled' && el) {
        el.textContent = 'Sign-in was canceled. Close this tab and try again in Brifo.';
      } else if (reason === 'blocked' && el) {
        el.textContent = 'Access was blocked by Google. Your account may not be an approved test user.';
      } else if (reason === 'state' && el) {
        el.textContent = 'Security validation failed. Close this tab and try again in Brifo.';
      }
    </script>
  </body>
</html>
