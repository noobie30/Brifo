<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Brifo - Sign-in Complete</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f9fafb;
        color: #111827;
      }
      .card {
        width: min(440px, calc(100% - 40px));
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 20px;
        padding: 48px 40px;
        text-align: center;
        animation: fadeIn 0.4s ease-out;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .logo { width: 56px; height: 56px; margin: 0 auto 24px; border-radius: 14px; }
      .check {
        width: 56px; height: 56px; margin: 0 auto 20px;
        background: #10b981;
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
      }
      .check svg { width: 28px; height: 28px; }
      h1 { font-size: 22px; font-weight: 600; margin-bottom: 8px; }
      .message { font-size: 15px; color: #6b7280; line-height: 1.6; }
    </style>
  </head>
  <body>
    <div class="card">
      <img src="/favicon.png" alt="Brifo" class="logo" />
      <div class="check">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M5 13l4 4L19 7" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h1 id="heading">Sign-in complete</h1>
      <p class="message" id="message">You're all set. Return to the Brifo app to continue.</p>
    </div>
    <script>
      const params = new URLSearchParams(window.location.search);
      const flow = params.get('flow');
      if (flow === 'jira') {
        document.title = 'Brifo - Jira Connected';
        const h = document.getElementById('heading');
        const m = document.getElementById('message');
        if (h) h.textContent = 'Jira connected';
        if (m) m.textContent = 'Your Jira workspace is connected. Return to the Brifo app to continue.';
      }

      // Attempt to auto-close the tab immediately. Browsers only allow
      // window.close() on windows opened via script (window.open) — for
      // OAuth return tabs opened externally by the desktop app this will
      // silently no-op and the clean success card just stays visible,
      // which is still better UX than a stuck "0 seconds" countdown.
      try { window.open('', '_self').close(); } catch (e) {}
      try { window.close(); } catch (e) {}
    </script>
  </body>
</html>
