<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Brifo — Sign-in complete</title>
    <meta name="theme-color" content="#16150F" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        color-scheme: light;
        --canvas: #f7f6f3;
        --surface: #ffffff;
        --subtle: #f3f2ee;
        --fg: #16150f;
        --fg-muted: #6f6d63;
        --fg-subtle: #9a988e;
        --border: #e6e4de;
        --accent: #2e5bff;
        --accent-soft: rgba(46, 91, 255, 0.08);
        --success: #0e7b4e;
        --success-soft: rgba(14, 123, 78, 0.1);
      }
      body {
        font-family:
          "Geist", ui-sans-serif, system-ui, -apple-system, "Segoe UI",
          sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--canvas);
        color: var(--fg);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        font-feature-settings: "ss01", "cv11";
        position: relative;
        overflow: hidden;
      }
      .glow {
        position: absolute;
        top: -180px;
        left: 50%;
        transform: translateX(-50%);
        width: 620px;
        height: 620px;
        border-radius: 50%;
        background: var(--accent);
        opacity: 0.08;
        filter: blur(90px);
        pointer-events: none;
      }
      .card {
        position: relative;
        width: min(460px, calc(100% - 40px));
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 44px 40px 36px;
        text-align: center;
        animation: cardIn 0.45s cubic-bezier(0.2, 0.8, 0.2, 1);
      }
      @keyframes cardIn {
        from {
          opacity: 0;
          transform: translateY(12px) scale(0.99);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
      .brand {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 28px;
      }
      .brand svg {
        display: block;
      }
      .brand-name {
        font-size: 14px;
        font-weight: 600;
        letter-spacing: -0.2px;
      }
      .check {
        width: 48px;
        height: 48px;
        margin: 0 auto 20px;
        background: var(--success-soft);
        color: var(--success);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        animation: checkPop 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) 0.1s both;
      }
      @keyframes checkPop {
        from {
          transform: scale(0.6);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }
      .check svg {
        width: 22px;
        height: 22px;
      }
      .serif {
        font-family: "Instrument Serif", ui-serif, Georgia, serif;
        font-size: 30px;
        letter-spacing: -0.6px;
        line-height: 1.1;
        margin-bottom: 8px;
        font-weight: 500;
      }
      .message {
        font-size: 14px;
        color: var(--fg-muted);
        line-height: 1.6;
        max-width: 320px;
        margin: 0 auto 24px;
      }
      .actions {
        display: flex;
        flex-direction: column;
        gap: 8px;
        align-items: stretch;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        height: 42px;
        padding: 0 20px;
        border-radius: 10px;
        font-family: inherit;
        font-size: 14px;
        font-weight: 500;
        line-height: 1;
        cursor: pointer;
        border: 1px solid transparent;
        transition:
          background 120ms,
          border-color 120ms,
          color 120ms;
        text-decoration: none;
      }
      .btn-primary {
        background: var(--fg);
        color: #fff;
      }
      .btn-primary:hover {
        background: #000;
      }
      .btn-ghost {
        background: transparent;
        color: var(--fg-muted);
      }
      .btn-ghost:hover {
        background: var(--subtle);
        color: var(--fg);
      }
      .hint {
        margin-top: 18px;
        font-family: "Geist Mono", ui-monospace, monospace;
        font-size: 11px;
        color: var(--fg-subtle);
        letter-spacing: 0.1px;
      }
      .hint strong {
        color: var(--fg-muted);
        font-weight: 500;
      }
      .dot {
        display: inline-block;
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: var(--accent);
        margin: 0 6px;
        transform: translateY(-2px);
      }
    </style>
  </head>
  <body>
    <div class="glow" aria-hidden="true"></div>
    <main class="card">
      <div class="brand">
        <svg width="36" height="36" viewBox="0 0 24 24" aria-hidden="true">
          <rect
            x="0.5"
            y="0.5"
            width="23"
            height="23"
            rx="6"
            fill="#F3F2EE"
            stroke="#E6E4DE"
            stroke-width="0.75"
          />
          <path
            fill="#2E5BFF"
            fill-rule="evenodd"
            clip-rule="evenodd"
            d="M4.6 6.6H9.1A2.6 2.6 0 0 1 9.1 11.8A2.8 2.8 0 0 1 9.1 17.4H4.6V6.6ZM6.6 8.5V9.9H8.9A0.7 0.7 0 0 0 8.9 8.5H6.6ZM6.6 13.5V15.5H9.1A1.0 1.0 0 0 0 9.1 13.5H6.6Z"
          />
          <circle cx="14.5" cy="12" r="0.9" fill="#2E5BFF" />
          <path
            stroke="#2E5BFF"
            stroke-width="1.5"
            stroke-linecap="round"
            fill="none"
            d="M16.55 9.95A2.9 2.9 0 0 1 16.55 14.05"
          />
          <path
            stroke="#2E5BFF"
            stroke-width="1.5"
            stroke-linecap="round"
            fill="none"
            d="M17.96 8.54A4.9 4.9 0 0 1 17.96 15.46"
          />
        </svg>
        <span class="brand-name">Brifo</span>
      </div>

      <div class="check" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none">
          <path
            d="M5 12.5l5 5L20 7.5"
            stroke="currentColor"
            stroke-width="2.4"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </div>

      <h1 class="serif" id="heading">Sign-in complete</h1>
      <p class="message" id="message">
        You're all set. Returning you to the Brifo app now.
      </p>

      <div class="actions">
        <a
          id="open-app"
          class="btn btn-primary"
          href="brifo://auth-success?flow=google"
        >
          Open Brifo
        </a>
      </div>

      <div class="hint">
        <strong>Tip</strong> <span class="dot"></span>
        If Brifo doesn't open, switch to the app manually, your session is ready.
      </div>
    </main>

    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var flow = params.get("flow") || "google";

        if (flow === "jira") {
          document.title = "Brifo — Jira connected";
          var h = document.getElementById("heading");
          var m = document.getElementById("message");
          if (h) h.textContent = "Jira connected";
          if (m)
            m.textContent =
              "Your Jira workspace is connected. Returning you to Brifo now.";
        }

        // Point the "Open Brifo" button at the right sub-flow so the
        // desktop app can log/react if it cares.
        var openBtn = document.getElementById("open-app");
        if (openBtn) {
          openBtn.setAttribute(
            "href",
            "brifo://auth-success?flow=" + encodeURIComponent(flow),
          );
        }

        // Auto-redirect into the app via the brifo:// protocol. If the
        // Brifo app is installed and has registered the scheme, macOS
        // (or Windows/Linux) will launch/focus it. If it isn't
        // installed, nothing happens and the card stays visible.
        setTimeout(function () {
          window.location.href =
            "brifo://auth-success?flow=" + encodeURIComponent(flow);
        }, 700);

        // As a fallback, try to close the tab a bit later. Browsers
        // only allow window.close() on windows opened via script — for
        // OAuth tabs opened externally this is a silent no-op.
        setTimeout(function () {
          try {
            window.open("", "_self").close();
          } catch (e) {}
          try {
            window.close();
          } catch (e) {}
        }, 2200);
      })();
    </script>
  </body>
</html>
