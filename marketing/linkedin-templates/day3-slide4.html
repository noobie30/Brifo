<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  width: 1200px; height: 627px; overflow: hidden;
  background: #2E4FD9;
  font-family: 'Geist', system-ui, sans-serif;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 80px; text-align: center; position: relative;
}
.slide-num { font-size: 13px; letter-spacing: 0.14em; text-transform: uppercase; font-weight: 700; color: rgba(255,255,255,0.5); margin-bottom: 24px; }
.headline { font-family: 'Instrument Serif', Georgia, serif; font-size: 64px; color: white; line-height: 1.1; margin-bottom: 20px; }
.sub { font-size: 18px; color: rgba(255,255,255,0.65); line-height: 1.6; margin-bottom: 36px; }
.cta-pill { background: white; color: #2E4FD9; border-radius: 100px; padding: 16px 48px; font-size: 18px; font-weight: 700; display: inline-block; }
.wordmark { position: absolute; bottom: 36px; left: 80px; display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 700; color: rgba(255,255,255,0.65); }
.wordmark img { width: 20px; height: 20px; filter: brightness(10); opacity: 0.8; }
</style>
</head>
<body>
  <div class="slide-num">AUTO-DETECTION · 04/04</div>
  <div class="headline">Notes without intrusion.<br/>Beta open now.</div>
  <div class="sub">No bot. No record button. Just clean notes<br/>the moment you hang up.</div>
  <div class="cta-pill">Register → [FORM LINK]</div>
  <div class="wordmark"><img src="{{LOGO}}"> Brifo</div>
</body>
</html>
