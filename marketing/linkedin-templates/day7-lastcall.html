<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  width: 1200px; height: 627px; overflow: hidden;
  background: #2E4FD9;
  font-family: 'Geist', system-ui, sans-serif;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 80px; text-align: center; position: relative; gap: 0;
}
.logo { width: 64px; height: 64px; object-fit: contain; filter: brightness(10); opacity: 0.85; margin-bottom: 20px; }
.label { font-size: 13px; letter-spacing: 0.14em; text-transform: uppercase; font-weight: 700; color: rgba(255,255,255,0.5); margin-bottom: 16px; }
.headline { font-family: 'Instrument Serif', Georgia, serif; font-size: 80px; color: white; line-height: 1.05; margin-bottom: 20px; }
.sub { font-size: 18px; color: rgba(255,255,255,0.65); line-height: 1.6; margin-bottom: 36px; max-width: 700px; }
.cta-pill { background: white; color: #2E4FD9; border-radius: 100px; padding: 18px 56px; font-size: 20px; font-weight: 700; display: inline-block; }
.wordmark { position: absolute; bottom: 36px; left: 80px; display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 700; color: rgba(255,255,255,0.65); }
.wordmark img { width: 20px; height: 20px; filter: brightness(10); opacity: 0.8; }
</style>
</head>
<body>
  <img src="{{LOGO}}" class="logo">
  <div class="label">LAST CALL</div>
  <div class="headline">Beta closes tonight.</div>
  <div class="sub">Every meeting. Every action item. Written and pushed to Jira.<br/>Without lifting a finger.</div>
  <div class="cta-pill">Register now → [FORM LINK]</div>
  <div class="wordmark"><img src="{{LOGO}}"> Brifo</div>
</body>
</html>
