<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  width: 1200px; height: 627px; overflow: hidden;
  background: #F3F2EE;
  font-family: 'Geist', system-ui, sans-serif;
  display: flex; align-items: center;
  padding: 72px 96px; gap: 80px; position: relative;
}
.left { flex: 0 0 auto; }
.big-stat { font-family: 'Instrument Serif', Georgia, serif; font-size: 320px; font-weight: 700; color: #2E4FD9; line-height: 1; }
.right { flex: 1; display: flex; flex-direction: column; gap: 20px; }
.slide-num { font-size: 13px; letter-spacing: 0.14em; text-transform: uppercase; font-weight: 700; color: #2E4FD9; }
.stat-label { font-size: 22px; color: #9a988e; }
.copy { font-family: 'Instrument Serif', Georgia, serif; font-size: 48px; color: #16150f; line-height: 1.2; }
.wordmark { position: absolute; bottom: 36px; left: 80px; display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 700; color: #16150f; }
.wordmark img { width: 20px; height: 20px; }
.arrow { position: absolute; right: 56px; bottom: 36px; color: #9a988e; font-size: 24px; }
</style>
</head>
<body>
  <div class="left">
    <div class="big-stat">1</div>
  </div>
  <div class="right">
    <div class="slide-num">JIRA PUSH · 04/06</div>
    <div class="stat-label">tap to send every task to Jira</div>
    <div class="copy">No copy-paste.<br/>No tab-switching.<br/>No "I'll do it after the next call."</div>
  </div>
  <div class="wordmark"><img src="{{LOGO}}"> Brifo</div>
  <div class="arrow">→</div>
</body>
</html>
