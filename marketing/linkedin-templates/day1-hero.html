<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  width: 1200px; height: 627px; overflow: hidden;
  background: #F3F2EE;
  font-family: 'Geist', system-ui, sans-serif;
  display: flex; align-items: center;
  padding: 60px 80px; gap: 64px; position: relative;
}
.left { display: flex; flex-direction: column; gap: 24px; flex: 1; }
.label { font-size: 13px; letter-spacing: 0.14em; text-transform: uppercase; font-weight: 700; color: #2E4FD9; }
.headline { font-family: 'Instrument Serif', Georgia, serif; font-size: 64px; line-height: 1.05; color: #16150f; }
.sub { font-size: 16px; color: #9a988e; line-height: 1.6; }
.right { flex: 0 0 380px; }
.mac-window { background: white; border-radius: 14px; border: 1px solid #e6e4de; box-shadow: 0 6px 32px rgba(0,0,0,0.09); overflow: hidden; }
.mac-bar { background: #f5f4f1; padding: 12px 18px; display: flex; align-items: center; gap: 7px; border-bottom: 1px solid #e6e4de; }
.dot { width: 12px; height: 12px; border-radius: 50%; }
.mac-title { margin-left: auto; font-size: 12px; color: #9a988e; display: flex; align-items: center; gap: 6px; }
.mac-title img { width: 14px; height: 14px; }
.mac-body { padding: 20px; }
.section-label { font-size: 13px; font-weight: 700; color: #16150f; margin-bottom: 14px; }
.row { border-radius: 8px; padding: 12px 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
.row.cream { background: #f3f2ee; }
.row.blue  { background: #2E4FD9; }
.row.dim   { background: #f3f2ee; opacity: 0.6; }
.row .name { font-size: 13px; font-weight: 600; color: #16150f; }
.row.blue .name { color: white; }
.row .time { font-size: 11px; color: #9a988e; margin-top: 3px; }
.row.blue .time { color: rgba(255,255,255,0.6); }
.badge { font-size: 11px; padding: 4px 12px; border-radius: 20px; font-weight: 600; }
.b-cap { background: #d1fae5; color: #0e7b4e; }
.b-live { background: rgba(255,255,255,0.2); color: white; }
.b-sch { color: #9a988e; }
.caption { font-size: 12px; color: #9a988e; text-align: center; margin-top: 10px; }
.wordmark { position: absolute; bottom: 36px; left: 80px; display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 700; color: #16150f; }
.wordmark img { width: 20px; height: 20px; }
</style>
</head>
<body>
  <div class="left">
    <img src="{{LOGO}}" style="width:88px;height:88px;object-fit:contain;">
    <div>
      <div class="label" style="margin-bottom:12px;">BRIFO BETA</div>
      <div class="headline">Beta now open.</div>
      <div class="sub" style="margin-top:14px;">Meeting notes that write themselves.<br/>No bot. No record button.</div>
    </div>
  </div>
  <div class="right">
    <div class="mac-window">
      <div class="mac-bar">
        <div class="dot" style="background:#ff5f57;"></div>
        <div class="dot" style="background:#febc2e;"></div>
        <div class="dot" style="background:#28c840;"></div>
        <div class="mac-title"><img src="{{LOGO}}"> Brifo</div>
      </div>
      <div class="mac-body">
        <div class="section-label">Today's meetings</div>
        <div class="row cream">
          <div><div class="name">Standup</div><div class="time">09:30</div></div>
          <span class="badge b-cap">Captured</span>
        </div>
        <div class="row blue">
          <div><div class="name">Design review</div><div class="time">11:00</div></div>
          <span class="badge b-live">Live · 12m ●</span>
        </div>
        <div class="row dim">
          <div><div class="name" style="color:#9a988e;">Sprint planning</div><div class="time">16:00</div></div>
          <span class="badge b-sch">Scheduled</span>
        </div>
      </div>
    </div>
    <div class="caption">Auto-detected. No bot.</div>
  </div>
  <div class="wordmark"><img src="{{LOGO}}"> Brifo</div>
</body>
</html>
